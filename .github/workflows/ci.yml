# ============================================================
# Brane OS — CI Pipeline (GitHub Actions)
# ============================================================
# Runs on every push and pull request to main.
# Validates:
#   1. Kernel compiles for x86_64-unknown-none
#   2. Code formatting (rustfmt)
#   3. Lints (clippy)
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # -----------------------------------------------------------------
  # Build — compile the kernel for bare-metal x86_64
  # -----------------------------------------------------------------
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (debug)
        run: cargo build

      - name: Build (release)
        run: cargo build --release

  # -----------------------------------------------------------------
  # Format — check code formatting with rustfmt
  # -----------------------------------------------------------------
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # -----------------------------------------------------------------
  # Clippy — lint checks
  # -----------------------------------------------------------------
  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rust-src, llvm-tools-preview
          targets: x86_64-unknown-none

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-clippy-

      - name: Run Clippy
        run: cargo clippy -- -D warnings
